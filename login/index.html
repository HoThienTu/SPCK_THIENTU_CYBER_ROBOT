<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberCore - Đăng nhập Hệ thống</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-container">
  <div class="robot-bg"></div>
  <div class="overlay-grid"></div>
</div>

<div class="login-container">
  <div class="glass-card">
    <div class="header">
      <div class="robot-icon">
        <i class="fa-solid fa-microchip"></i>
      </div>
      <h2>Cyber Robot</h2>
      <p>Robot trong tầm tay–Tương lai trong tầm mắt.</p>
    </div>

    <form id="loginForm">
      <!-- Gmail -->
      <div class="form-group">
        <label>Địa chỉ Gmail</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" id="email" placeholder="admin@gmail.com" required>
        </div>
      </div>

      <!-- Mật khẩu -->
      <div class="form-group">
        <label>Mật khẩu</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
      </div>

      <div class="options">
        <label><input type="checkbox"> Ghi nhớ tôi</label>
        <a href="#">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="btn-login">
        ĐĂNG NHẬP <i class="fa-solid fa-right-to-bracket"></i>
      </button>
    </form>

    <div class="footer-links">
      <p>Chưa có tài khoản Robot? <a href="../register/index.html">Đăng ký ngay</a></p>
    </div>
  </div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // Tài khoản mặc định của bạn
        const correctEmail = "thientu25102011@gmail.com";
        const correctPassword = "thientu2510";

        // Kiểm tra từ LocalStorage (người dùng đã đăng ký) hoặc tài khoản admin mặc định
        let userList = JSON.parse(localStorage.getItem('robotUsers')) || [];
        const registeredUser = userList.find(user => user.email === email && user.password === password);

        if ((email === correctEmail && password === correctPassword) || registeredUser) {
            localStorage.setItem('currentUser', registeredUser ? registeredUser.username : "Admin");
            alert("Kết nối thành công! Đang vào hệ thống...");
            window.location.href = "../index.html";
        } else {
            alert("Thông tin không chính xác. Vui lòng thử lại!");
        }
    });

</body>
</html>
