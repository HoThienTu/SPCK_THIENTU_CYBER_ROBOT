<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberCore - Đăng ký thành viên</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-container">
  <div class="robot-bg"></div>
  <div class="overlay-grid"></div>
</div>

<div class="register-container">
  <div class="glass-card">
    <div class="header">
      <div class="robot-icon">
        <i class="fa-solid fa-headset"></i>
      </div>
      <h2>Cyber Robot</h2>
      <p>Robot trong tầm tay–Tương lai trong tầm mắt.</p>
    </div>

    <form id="registerForm">
      <!-- Tên người dùng -->
      <div class="form-group">
        <label>Tên người dùng</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-user"></i>
          <input type="text" id="regUser" placeholder="Ví dụ: RobotMaster99" required>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" id="regEmail" placeholder="email@congnghe.com" required>
        </div>
      </div>

      <!-- Mật khẩu -->
      <div class="form-group">
        <label>Mật khẩu</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="regPass" placeholder="••••••••" required>
        </div>
      </div>

      <!-- Nhập lại mật khẩu -->
      <div class="form-group">
        <label>Xác nhận mật khẩu</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-shield-check"></i>
          <input type="password" id="regConfirm" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn-register">
        Đăng Ký <i class="fa-solid fa-arrow-right"></i>
      </button>
    </form>

    <div class="footer-links">
      <p>Bạn đã có tài khoản? <a href="../login/index.html">Đăng nhập</a></p>
    </div>
  </div>
</div>

<script>
  // Logic đăng ký của bạn được giữ nguyên
  const registerForm = document.getElementById('registerForm');
  registerForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('regUser').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPass').value;
    const confirmPass = document.getElementById('regConfirm').value;

    if (password !== confirmPass) {
      alert("Mật khẩu không khớp, vui lòng kiểm tra lại!");
      return;
    }

    let userList = JSON.parse(localStorage.getItem('robotUsers')) || [];
    if (userList.find(user => user.email === email)) {
      alert("Email này đã được sử dụng!");
      return;
    }

    userList.push({ username, email, password });
    localStorage.setItem('robotUsers', JSON.stringify(userList));
    localStorage.setItem('currentUser', username);

    alert("Chào mừng " + username + "! Đăng ký thành công.");
    window.location.href = "../index.html";
  });
</script>
<script>
  const registerForm = document.getElementById('registerForm');

  registerForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const username = document.getElementById('regUser').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPass').value;
    const confirmPass = document.getElementById('regConfirm').value;

    if (password !== confirmPass) {
      alert("Mật khẩu nhập lại không khớp!");
      return;
    }

    // LẤY DANH SÁCH TỪ LOCALSTORAGE
    let userList = JSON.parse(localStorage.getItem('robotUsers')) || [];

    const isExisted = userList.find(user => user.email === email);
    if (isExisted) {
      alert("Email này đã được đăng kí bởi người khác!");
      return;
    }

    const newUser = {
      username: username,
      email: email,
      password: password
    };
    userList.push(newUser);

    // LƯU VÀO LOCALSTORAGE
    localStorage.setItem('robotUsers', JSON.stringify(userList));

    alert("Đăng kí thành công! Mời bạn đăng nhập.");
    
    // CHUYỂN HƯỚNG SANG TRANG ĐĂNG NHẬP
    window.location.href = "../login/index.html"; 
  });
</script>

</body>
</html>
