<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Robot - Đăng ký</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Lớp nền ảnh Robot -->
<div class="bg-container">
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
</div>

<div class="register-box">
  <div class="logo-shop">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" alt="Robot Logo">
  </div>
  <h2>GIA NHẬP ROBOTIC</h2>

  <form id="registerForm">
    <div class="input-box">
      <input type="text" id="regUser" required>
      <label>Tên người dùng</label>
      <i class="icon-tech"></i>
    </div>

    <div class="input-box">
      <input type="email" id="regEmail" required>
      <label>Email liên hệ</label>
    </div>

    <div class="input-box">
      <input type="password" id="regPass" required>
      <label>Mật khẩu</label>
    </div>

    <div class="input-box">
      <input type="password" id="regConfirm" required>
      <label>Xác nhận mật khẩu</label>
    </div>

    <button type="submit" id="btnRegister">ĐĂNG KÝ NGAY</button>
  </form>

  <p>Bạn đã sở hữu Robot? <a href="../login/index.html">Đăng nhập ngay</a></p>
</div>

<script>
  const registerForm = document.getElementById('registerForm');

  registerForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const username = document.getElementById('regUser').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPass').value;
    const confirmPass = document.getElementById('regConfirm').value;

    if (password !== confirmPass) {
      alert("Mật khẩu nhập lại không khớp!");
      return;
    }

    let userList = JSON.parse(localStorage.getItem('robotUsers')) || [];

    const isExisted = userList.find(user => user.email === email);
    if (isExisted) {
      alert("Email này đã được đăng kí bởi người khác!");
      return;
    }

    const newUser = {
      username: username,
      email: email,
      password: password
    };
    userList.push(newUser);

    localStorage.setItem('robotUsers', JSON.stringify(userList));
    localStorage.setItem('currentUser', username);

    alert("Đăng kí thành công! Chào mừng " + username);
    window.location.href = "../index.html";
  });
</script>

</body>
</html>
