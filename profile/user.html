<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản - PrimeRobotics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-light">
    <!-- Navbar (Copy từ index.html nhưng sửa link) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html"><i class="fa-solid fa-robot text-info"></i> PrimeRobotics</a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-3 mb-4">
                <div class="profile-sidebar text-center">
                    <img src="https://ui-avatars.com/api/?name=User&background=00d4ff&color=fff" alt="Avatar" class="profile-avatar mb-3">
                    <h5 class="fw-bold">Nguyễn Văn A</h5>
                    <p class="text-muted small">Thành viên Bạc</p>
                    <hr>
                    <div class="nav flex-column nav-pills text-start" id="v-pills-tab" role="tablist" aria-orientation="vertical">
                        <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#info"><i class="fa-solid fa-user me-2"></i> Thông tin</button>
                        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#orders"><i class="fa-solid fa-box me-2"></i> Đơn hàng</button>
                        <a href="../index.html" class="nav-link text-danger"><i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất</a>
                    </div>
                </div>
            </div>

            <!-- Content -->
            <div class="col-lg-9">
                <div class="tab-content">
                    <!-- Tab Thông tin -->
                    <div class="tab-pane fade show active" id="info">
                        <div class="card border-0 shadow-sm rounded-4 p-4">
                            <h4 class="fw-bold mb-4">Cài đặt tài khoản</h4>
                            <form>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Họ và tên</label>
                                        <input type="text" class="form-control rounded-3" value="Nguyễn Văn A">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control rounded-3" value="user@example.com" readonly>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Số điện thoại</label>
                                        <input type="text" class="form-control rounded-3" value="0912345678">
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label">Địa chỉ giao hàng</label>
                                        <textarea class="form-control rounded-3">123 Đường ABC, Quận 1, TP.HCM</textarea>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-info mt-4 px-4 fw-bold">Lưu thay đổi</button>
                            </form>
                        </div>
                    </div>

                    <!-- Tab Đơn hàng -->
                    <div class="tab-pane fade" id="orders">
                        <div class="card border-0 shadow-sm rounded-4 p-4">
                            <h4 class="fw-bold mb-4">Lịch sử đơn hàng</h4>
                            <div class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Mã đơn</th>
                                            <th>Ngày mua</th>
                                            <th>Sản phẩm</th>
                                            <th>Tổng tiền</th>
                                            <th>Trạng thái</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td>#PR1001</td>
                                            <td>12/10/2023</td>
                                            <td>Robot AI Gen 2</td>
                                            <td class="fw-bold">150.000.000đ</td>
                                            <td><span class="badge bg-success">Hoàn thành</span></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
