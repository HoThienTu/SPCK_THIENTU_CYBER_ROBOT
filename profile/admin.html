<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị - PrimeRobotics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-light">
    <!-- Navbar Admin -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top border-bottom border-info">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">
                <i class="fa-solid fa-shield-halved text-info"></i> ADMIN PANEL
            </a>
            <span class="text-white-50">Xin chào, Admin!</span>
        </div>
    </nav>

    <div class="container-fluid my-4">
        <div class="row gx-4">
            <!-- Sidebar Quản trị -->
            <div class="col-md-3 col-lg-2 mb-4">
                <div class="list-group shadow-sm rounded-4 overflow-hidden border-0">
                    <a href="#" class="list-group-item list-group-item-action active bg-info border-0 py-3">
                        <i class="fa-solid fa-chart-line me-2"></i> Thống kê chung
                    </a>
                    <a href="#" class="list-group-item list-group-item-action py-3">
                        <i class="fa-solid fa-robot me-2"></i> Quản lý Robot
                    </a>
                    <a href="#" class="list-group-item list-group-item-action py-3">
                        <i class="fa-solid fa-users me-2"></i> Người dùng
                    </a>
                    <a href="#" class="list-group-item list-group-item-action py-3">
                        <i class="fa-solid fa-file-invoice-dollar me-2"></i> Đơn hàng
                    </a>
                </div>
            </div>

            <!-- Nội dung chính -->
            <div class="col-md-9 col-lg-10">
                <!-- Thống kê nhanh -->
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <div class="card stat-card bg-primary text-white p-3">
                            <h6 class="small uppercase">Doanh thu tháng</h6>
                            <h3 class="fw-bold mb-0">1.2 tỷ</h3>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-success text-white p-3">
                            <h6 class="small">Sản phẩm đã bán</h6>
                            <h3 class="fw-bold mb-0">150</h3>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-warning text-dark p-3">
                            <h6 class="small">Đơn hàng mới</h6>
                            <h3 class="fw-bold mb-0">12</h3>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-danger text-white p-3">
                            <h6 class="small">Phản hồi khách hàng</h6>
                            <h3 class="fw-bold mb-0">5</h3>
                        </div>
                    </div>
                </div>

                <!-- Bảng quản lý sản phẩm -->
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0">Danh sách Robot đang bán</h5>
                        <button class="btn btn-dark btn-sm rounded-pill px-3">+ Thêm Robot mới</button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">ID</th>
                                        <th>Sản phẩm</th>
                                        <th>Giá</th>
                                        <th>Kho hàng</th>
                                        <th class="text-end pe-4">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td class="ps-4">#001</td>
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <img src="../z7325101041384_4bfa4537d4a87a237099cbc2e455a3bf.jpg" width="40" class="me-2 rounded">
                                                <span class="fw-bold">Robot AI Gen 2</span>
                                            </div>
                                        </td>
                                        <td>150,000,000đ</td>
                                        <td>10 cái</td>
                                        <td class="text-end pe-4">
                                            <button class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-pen"></i></button>
                                            <button class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i></button>
                                        </td>
                                    </tr>
                                    <!-- Thêm các dòng khác tương tự -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
