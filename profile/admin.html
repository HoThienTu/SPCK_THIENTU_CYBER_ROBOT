<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản trị - PrimeRobotics</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Style chung -->
    <link rel="stylesheet" href="../style.css">
    <style>
        :root {
            --admin-bg: #03050a;
            --card-bg: rgba(10, 20, 40, 0.7);
            --cyan-neon: #00d4ff;
            --border-color: rgba(0, 212, 255, 0.3);
        }

        /* NỀN CÔNG NGHỆ VỚI LỚP LƯỚI GRID */
        body {
            background-color: var(--admin-bg);
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; /* Độ rộng của lưới */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HIỆU ỨNG KÍNH MỜ CHO CÁC BẢNG DANH SÁCH */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        /* SIDEBAR HIỆN ĐẠI */
        .admin-sidebar {
            height: 100%;
            padding: 20px;
        }

        .nav-link-admin {
            color: #aaa;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .nav-link-admin:hover, .nav-link-admin.active {
            background: rgba(0, 212, 255, 0.15);
            color: var(--cyan-neon);
            text-shadow: 0 0 10px var(--cyan-neon);
        }

        /* THẺ THỐNG KÊ PHÁT SÁNG */
        .stat-card-admin {
            padding: 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .stat-card-admin::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
        }

        /* DANH SÁCH SẢN PHẨM */
        .table-admin {
            color: #fff;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .table-admin tbody tr {
            background: rgba(255, 255, 255, 0.05);
            transition: 0.3s;
            border-radius: 10px;
        }

        .table-admin tbody tr:hover {
            background: rgba(0, 212, 255, 0.1);
            transform: scale(1.01);
        }

        .robot-thumb {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: contain;
            background: #000;
            border: 1px solid var(--cyan-neon);
        }

        /* NÚT BẤM NEON */
        .btn-neon {
            background: transparent;
            border: 1px solid var(--cyan-neon);
            color: var(--cyan-neon);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
            transition: 0.3s;
        }

        .btn-neon:hover {
            background: var(--cyan-neon);
            color: #000;
            box-shadow: 0 0 20px var(--cyan-neon);
        }

        /* MODAL */
        .modal-content {
            background: #0b0d17;
            border: 1px solid var(--cyan-neon);
            border-radius: 20px;
        }
        .form-control-admin {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border-color);
            color: white;
        }
    </style>
</head>
<body>

    <!-- TOP NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary sticky-top" style="background: rgba(11, 13, 23, 0.9);">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="../index.html">
                <i class="fa-solid fa-shield-cat text-info me-2 fs-3"></i>
                <div>
                    <div style="font-size: 1rem; line-height: 1;">PRIME ROBOTICS</div>
                    <div style="font-size: 0.6rem; color: #00d4ff;">ADMIN CONTROL</div>
                </div>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <span class="me-3 small d-none d-md-block">XIN CHÀO: <b id="admin-name" class="text-info">ADMIN</b></span>
                <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="logoutAdmin()">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR -->
            <div class="col-lg-2 d-none d-lg-block border-end border-secondary p-0">
                <div class="admin-sidebar">
                    <a href="#" class="nav-link-admin active"><i class="fa-solid fa-layer-group me-2"></i> Dashboard</a>
                    <a href="#" class="nav-link-admin"><i class="fa-solid fa-robot me-2"></i> Kho Robot</a>
                    <a href="#" class="nav-link-admin"><i class="fa-solid fa-users me-2"></i> Khách hàng</a>
                    <hr class="border-secondary">
                    <a href="../index.html" class="nav-link-admin text-info"><i class="fa-solid fa-eye me-2"></i> Xem Shop</a>
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="col-lg-10 p-4">
                
                <!-- THỐNG KÊ -->
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <div class="stat-card-admin">
                            <div class="small text-white-50">DOANH THU</div>
                            <h3 class="fw-bold text-info mb-0">1.250 tỷ</h3>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card-admin">
                            <div class="small text-white-50">SẢN PHẨM</div>
                            <h3 id="stat-robot-count" class="fw-bold text-success mb-0">0</h3>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card-admin">
                            <div class="small text-white-50">ĐƠN HÀNG</div>
                            <h3 class="fw-bold text-warning mb-0">86</h3>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card-admin">
                            <div class="small text-white-50">HỆ THỐNG</div>
                            <h3 class="fw-bold text-primary mb-0">ỔN ĐỊNH</h3>
                        </div>
                    </div>
                </div>

                <!-- DANH SÁCH ROBOT -->
                <div class="glass-panel p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold mb-0 text-uppercase letter-spacing-1">
                            <i class="fa-solid fa-list-check text-info me-2"></i> Cấu hình Robot Hệ thống
                        </h5>
                        <button class="btn btn-neon btn-sm rounded-pill px-4 fw-bold" data-bs-toggle="modal" data-bs-target="#addRobotModal">
                            <i class="fa-solid fa-plus me-1"></i> THÊM ROBOT MỚI
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-admin">
                            <thead>
                                <tr>
                                    <th>Robot Model</th>
                                    <th>Loại</th>
                                    <th>Đơn giá</th>
                                    <th>Số lượng</th>
                                    <th class="text-end">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="robot-table-body">
                                <!-- JS render data here -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- MODAL THÊM ROBOT -->
    <div class="modal fade" id="addRobotModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-info fw-bold">NHẬP DỮ LIỆU ROBOT MỚI</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addRobotForm">
                        <div class="mb-3">
                            <label class="small fw-bold text-white-50">TÊN ROBOT</label>
                            <input type="text" id="newRobotName" class="form-control form-control-admin" placeholder="Tên robot..." required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="small fw-bold text-white-50">GIÁ (VNĐ)</label>
                                <input type="number" id="newRobotPrice" class="form-control form-control-admin" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="small fw-bold text-white-50">SỐ LƯỢNG</label>
                                <input type="number" id="newRobotStock" class="form-control form-control-admin" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold text-white-50">LINK ẢNH</label>
                            <input type="text" id="newRobotImg" class="form-control form-control-admin" placeholder="https://...">
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light btn-sm rounded-pill px-3" data-bs-dismiss="modal">HỦY</button>
                    <button type="button" class="btn btn-info btn-sm rounded-pill px-4 fw-bold" onclick="saveNewRobot()">XÁC NHẬN</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // QUẢN LÝ DỮ LIỆU
        let robots = JSON.parse(localStorage.getItem('adminRobotList')) || [
            { id: 1, name: "Robot AI Gen 2", price: 150000000, stock: 10, img: "../z7325101041384_4bfa4537d4a87a237099cbc2e455a3bf.jpg" },
            { id: 2, name: "Robot Hút Bụi X1", price: 25500000, stock: 20, img: "../z7325109396184_2dcbcc9e6fc8aeb3864ab29d965bfc41.jpg" }
        ];

        window.onload = function() {
            checkAuth();
            renderTable();
        };

        function checkAuth() {
            const user = localStorage.getItem('currentUser');
            if (!user || user.toLowerCase() !== "admin") {
                window.location.href = "../index.html";
            } else {
                document.getElementById('admin-name').innerText = user.toUpperCase();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('robot-table-body');
            tbody.innerHTML = "";
            robots.forEach((r, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>
                            <img src="${r.img || '../z7325101041384_4bfa4537d4a87a237099cbc2e455a3bf.jpg'}" class="robot-thumb me-2">
                            <span class="fw-bold">${r.name}</span>
                        </td>
                        <td><span class="badge bg-dark text-info border border-info">Series AI</span></td>
                        <td class="text-info fw-bold">${r.price.toLocaleString()}đ</td>
                        <td>${r.stock}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteRobot(${index})">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('stat-robot-count').innerText = robots.length;
            localStorage.setItem('adminRobotList', JSON.stringify(robots));
        }

        function saveNewRobot() {
            const name = document.getElementById('newRobotName').value;
            const price = document.getElementById('newRobotPrice').value;
            const stock = document.getElementById('newRobotStock').value;
            const img = document.getElementById('newRobotImg').value;

            if(!name || !price || !stock) return alert("Vui lòng nhập đủ!");

            robots.push({
                id: Date.now(),
                name,
                price: parseInt(price),
                stock: parseInt(stock),
                img
            });

            renderTable();
            document.getElementById('addRobotForm').reset();
            bootstrap.Modal.getInstance(document.getElementById('addRobotModal')).hide();
        }

        function deleteRobot(index) {
            if(confirm("Xóa robot này?")) {
                robots.splice(index, 1);
                renderTable();
            }
        }

        function logoutAdmin() {
            localStorage.removeItem('currentUser');
            window.location.href = "../index.html";
        }
    </script>
</body>
</html>
